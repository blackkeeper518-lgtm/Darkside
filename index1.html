<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED-EYE EXTRACTOR - DARKSIDE ONLY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #000000; color: #e5e7eb; }
        .red-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .border-red { border-color: #ef4444; }
        .bg-dark-red { background-color: #1a0505; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-red pb-4">
            <div>
                <h1 class="text-3xl font-bold text-red-500 uppercase tracking-tighter">Red-Eye Extractor <span class="text-white text-sm font-light">V.1</span></h1>
                <p class="text-gray-400 text-sm">Target: Facebook Data Extraction for DARKSIDE</p>
            </div>
            <div class="text-right">
                <div class="inline-block px-3 py-1 bg-red-600 text-white text-xs rounded-full animate-pulse">SYSTEM ONLINE</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-dark-red p-6 rounded-lg border border-red red-glow">
                <h2 class="text-xl font-semibold text-red-500 mb-4">1. ข้อความดิบ (Raw Message)</h2>
                <textarea id="rawInput" class="w-full h-64 bg-black border border-gray-700 rounded p-4 text-sm focus:outline-none focus:border-red-500 transition-all" placeholder="วางข้อความจากคอมเมนต์หรือแชทที่นี่..."></textarea>
                <button onclick="extractData()" class="w-full mt-4 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded transition-all uppercase tracking-widest">สกัดข้อมูลเดี๋ยวนี้!</button>
            </div>

            <div class="bg-black p-6 rounded-lg border border-gray-800">
                <h2 class="text-xl font-semibold text-white mb-4">2. ข้อมูลที่สกัดได้ (Extracted)</h2>
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="text-red-400 block mb-1">ชื่อลูกค้า:</label>
                        <input type="text" id="resName" class="w-full bg-gray-900 border border-gray-700 p-2 rounded" readonly>
                    </div>
                    <div>
                        <label class="text-red-400 block mb-1">เบอร์โทรศัพท์:</label>
                        <input type="text" id="resPhone" class="w-full bg-gray-900 border border-gray-700 p-2 rounded" readonly>
                    </div>
                    <div>
                        <label class="text-red-400 block mb-1">ที่อยู่:</label>
                        <textarea id="resAddress" class="w-full h-24 bg-gray-900 border border-gray-700 p-2 rounded" readonly></textarea>
                    </div>
                </div>
                <div class="mt-6 flex gap-2">
                    <button onclick="copyToClipboard()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded text-xs">COPY DATA</button>
                    <button onclick="sendToLine()" class="flex-1 bg-green-700 hover:bg-green-600 py-2 rounded text-xs">SEND TO LINE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function extractData() {
            const input = document.getElementById('rawInput').value;
            
            // Regex Engine by Madam Violet
            const phoneRegex = /(0\d{1,2}-?\d{3}-?\d{3,4}|0\d{8,9})/;
            const phoneMatch = input.match(phoneRegex);
            
            // Basic Address Extraction (หาคำสำคัญ)
            const lines = input.split('\n').map(l => l.trim()).filter(l => l !== "");
            let name = lines[0] || "ไม่ระบุ";
            let phone = phoneMatch ? phoneMatch[0].replace(/-/g, '') : "ไม่พบเบอร์";
            let address = input.replace(phoneMatch ? phoneMatch[0] : '', '').replace(name, '').trim();

            document.getElementById('resName').value = name;
            document.getElementById('resPhone').value = phone;
            document.getElementById('resAddress').value = address;
        }

        function copyToClipboard() {
            const name = document.getElementById('resName').value;
            const phone = document.getElementById('resPhone').value;
            const addr = document.getElementById('resAddress').value;
            const text = `ชื่อ: ${name}\nโทร: ${phone}\nที่อยู่: ${addr}`;
            navigator.clipboard.writeText(text);
            alert('คัดลอกลง Clipboard แล้ว!');
        }

        function sendToLine() {
            alert('ระบบ LINE Integration: กรุณาใส่ Token ในฟังก์ชัน sendToLine ของสคริปต์');
        }
    </script>
</body>
</html>
